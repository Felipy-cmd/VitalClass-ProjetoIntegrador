<!DOCTYPE html>
<html lang="PT-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="src/styles/cadastroUsuario.css">
    <link rel="icon" href="src/image/LogoIcon2.png">
    <title>Cadastro Usuario</title>
</head>
<body>

    <div id="card">

        <div id="topbar">
            <img id="img" src="src/image/VitalClass.png">
            <h1>Cadastro/Usuario</h1>
            <button class="buttonBack">Voltar</button>
        </div>

        <div id="formulario">

            <p>Usuario:</p>
            <input type="text" placeholder="">

            <p>Senha:</p>
            <input type="password" placeholder="">

            <p>Confirmar Senha:</p>
            <input type="password" placeholder="">

            <div id="btnRow">
                <button class="btnEditar">Editar</button>
                <button class="btnConfirmar">Confirmar</button>
            </div>

        </div>

    </div>

</body>
</html>
